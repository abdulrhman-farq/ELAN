name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Public, RLS-protected anon values let the production build (NODE_ENV=production
# fail-fast) and the network-free public e2e complete. Real values live in Vercel.
env:
  CI: "true"
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://knldyssbwygrkxamttez.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtubGR5c3Nid3lncmt4YW10dGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTg4MjIsImV4cCI6MjA5NzQzNDgyMn0.0Ol4bTSVAevhFNGmII13bAKKtdztnO_F4wd62ZzOnK8' }}
  NEXT_PUBLIC_ELAN_DEMO: "false"

jobs:
  # REQUIRED — lint, types, unit tests, build.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  # REQUIRED — deterministic, network-free e2e (public, legal, accessibility).
  # No staging Supabase or secrets needed.
  e2e-public:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Public / legal / a11y e2e
        run: npx playwright test e2e/public.spec.ts e2e/a11y.spec.ts

  # NON-BLOCKING — authenticated member/admin journeys. Runs only when the
  # staging E2E_* secrets exist; otherwise it no-ops. continue-on-error keeps it
  # from failing the PR until staging Supabase is provisioned.
  e2e-authenticated:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    continue-on-error: true
    env:
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_IS_ADMIN: ${{ secrets.E2E_IS_ADMIN }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_MEMBER_EMAIL: ${{ secrets.E2E_MEMBER_EMAIL }}
      E2E_MEMBER_PASSWORD: ${{ secrets.E2E_MEMBER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for staging credentials
        id: guard
        run: |
          if [ -n "$E2E_EMAIL" ] || [ -n "$E2E_MEMBER_EMAIL" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Authenticated e2e skipped::Pending staging Supabase — set E2E_* secrets to enable."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - if: steps.guard.outputs.run == 'true'
        run: npm ci
      - if: steps.guard.outputs.run == 'true'
        run: npx playwright install --with-deps chromium
      - name: Authenticated e2e
        if: steps.guard.outputs.run == 'true'
        run: npx playwright test e2e/authenticated.spec.ts e2e/acceptance.spec.ts
